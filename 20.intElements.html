<!DOCTYPE html>
<html>
<body>

<h2>Interactive Elements Example</h2>

<!-- Details & Summary -->
<details>
  <summary>Click to see more info</summary>
  <p>This is hidden content that appears when you click the summary.</p>
</details>

<br>

<!-- Progress Bar -->
<label for="file">File Upload Progress:</label>
<progress id="file" value="40" max="100"></progress>

<br><br>

<!-- Meter -->
<label for="cpu">CPU Usage:</label>
<meter id="cpu" value="0.6" min="0" max="1">60%</meter>

</body>
</html>
