<!DOCTYPE html>
<html>
<head>
    <title>Floating Image</title>
</head>

<body>

    <img src="image.jpg" alt="Image"
         style="float: left; width: 150px;">

    <p>
        This is a simple example of a floating image.
        The image is placed on the left side and the text wraps around it.
    </p>

</body>
</html>
