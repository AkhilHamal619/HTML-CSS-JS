<!DOCTYPE html>
<html>
<head>
    <title>Image Map Example</title>
</head>

<body>

    <h2>Click Different Parts of the Image</h2>

    <!-- Different image used -->
    <img src="https://picsum.photos/400/300" alt="Sample Image"
         usemap="#mymap" width="400">

    <map name="mymap">

        <!-- Rectangle area -->
        <area shape="rect" coords="20,20,180,150"
              href="https://google.com" alt="Google">

        <!-- Circle area -->
        <area shape="circle" coords="300,200,50"
              href="https://youtube.com" alt="YouTube">

    </map>

</body>
</html>
