<!DOCTYPE html>
<html>
<head>
    <title>Image Map Example</title>
</head>

<body>

    <h2>Click on parts of the image</h2>

    <img src="image.jpg" alt="Map Image" usemap="#mymap" width="400">

    <map name="mymap">

        <area shape="rect" coords="50,50,150,150"
              href="https://google.com" alt="Google">

        <area shape="circle" coords="250,200,50"
              href="https://youtube.com" alt="YouTube">

    </map>

</body>
</html>
