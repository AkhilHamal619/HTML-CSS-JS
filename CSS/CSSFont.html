<!-- CSS Font Properties -->
 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Font Properties</title>
    <style>
    h1 {
    font-family: 'Arial', sans-serif;
    font-size: 32px;
    font-weight: bold;
    font-style: italic;
    font-variant: small-caps;
    line-height: 1.2;
    }
    p {
    font: normal 18px/1.5 'Times New Roman', serif;
    }
    </style>
</head>
<body>

    <h1>CSS Font Example</h1>
    <p>This paragraph demonstrates basic CSS font properties in a short program.</p>

</body>
</html>
