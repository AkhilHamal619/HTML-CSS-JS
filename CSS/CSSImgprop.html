<!-- CSS Image Properties -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Image Properties</title>
    <style>
    img {
    width: 200px;
    border: 2px solid black;
    border-radius: 10px;
    box-shadow: 5px 5px 10px gray;
    opacity: 0.9;
    }
    </style>
</head>
<body>
    <h1>CSS Image Properties</h1>
    <img src="image.jpg" alt="Sample Image">

</body>
</html>
