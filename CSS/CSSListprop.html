<!-- CSS List Properties -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS List Properties</title>
    <style>
    ul {
    list-style-type: square;
    list-style-position: inside;    
    }

    ol {
    list-style-type: upper-roman;
    }
    </style>
</head>
<body>

    <ul>
    <li>Apple</li>
    <li>Mango</li>
    </ul>

    <ol>
    <li>HTML</li>
    <li>CSS</li>
    </ol>

</body>
</html>
