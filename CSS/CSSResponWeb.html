<!-- Responsive Web Design -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive CSS</title>
    <style>
    body { font-family: Arial; margin:0; padding:0; }
    .container { display: flex; justify-content:left; padding:10px; }
    .box { flex:1 1 100%; max-width:300px; background: coral; color:#fff; padding:30px; text-align:center; }
    img { max-width:100%; height:auto; display:block; margin:10px auto; }
    </style>
</head>
<body>

    <h2 style="text-align:left;">Responsive Layout</h2>
    <div class="container">
    <div class="box">Box 1</div>
    </div>

    <img src="https://via.placeholder.com/600x200" alt="Responsive Image">

</body>
</html>
