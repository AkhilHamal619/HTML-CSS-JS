<!-- CSS Text Properties -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Text Properties</title>
    <style>
    h1 { color: blue; text-align: left; text-transform: uppercase; }
    p {
    color: green; font-size: 18px; font-style: italic; font-weight: bold;
    letter-spacing: 2px; word-spacing: 5px;
    text-decoration: underline; text-indent: 30px; line-height: 1.5;    
    }   
    </style>
</head>
<body>

    <h1>CSS Text Properties</h1>
    <p>This paragraph demonstrates most CSS text properties in a simple way.</p>

</body>
</html>
