<!-- CSS Text Effects -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Text Effects</title>
    <style>
    h1 {
    text-shadow: 2px 2px 5px gray;
    }

    p {
    width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border: 1px solid black;
    }
    </style>
</head>
<body>
    <h1>CSS Text Effects</h1>
    <h2>Text Shadow</h2>
    <p>This text is too long to fit in the box.</p>

</body>
</html>
