<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Units Example</title>
    <style>
    body { font-size: 16px; }
    p.px { font-size: 20px; }       /* pixels */
    p.percent { width: 50%; }       /* percentage */
    p.em { font-size: 2em; }        /* relative to parent */
    p.rem { font-size: 1.5rem; }    /* relative to root */
    p.vw { width: 50vw; background: #f0f0f0; } /* viewport width */
    </style>
</head>
<body>

    <p class="px">This is 20px text.</p>
    <p class="percent">This paragraph is 50% wide.</p>
    <p class="em">This is 2em text.</p>
    <p class="rem">This is 1.5rem text.</p>
    <p class="vw">This div is 50vw wide.</p>

</body>
</html>
