<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* selector { property: value; } */

    h1 
    {
      color: blue;          /* property : value */
      text-align: left;
    }

    .text {
      font-size: 18px;
      color: green;
    }

    #btn {
      background-color: red;
      color: white;
      padding: 10px;
    }
  </style>
</head>
<body>

<h1>CSS Syntax</h1>
<p class="text">This is a paragraph</p>
<button id="btn">Click</button>

</body>
</html>
