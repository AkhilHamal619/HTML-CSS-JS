<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z-index Demo</title>
    <style>
    .box { width:150px; height:150px; position:absolute;margin-top:50px; }
    .red  { background:red; top:50px; left:80px; z-index:1;}
    .blue { background:blue; top:100px; left:100px; z-index:2; margin-top: 20px;}
    .green{ background:green; top:120px; left:120px; z-index:3; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>z-index</h1>
    <div class="box red"></div>
    <div class="box blue"></div>
    <div class="box green"></div>

</body>
</html>
