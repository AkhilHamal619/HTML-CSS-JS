<!DOCTYPE html>
<html>
<body>
<canvas id="myCanvas" width="400" height="250" style="border:1px solid #d3d3d3;">
</canvas>
<script>
var c = document.getElementById("myCanvas");
var ctx = c.getContext("2d");

// Create gradient

var grd = ctx.createRadialGradient(150,100,10,180,120,200);
grd.addColorStop(0,"red");
grd.addColorStop(1,"white");

// Fill with gradient

ctx.fillStyle = grd;
ctx.fillRect(20,20,300,160);
</script>
</body>
</html>
