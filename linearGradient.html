<!DOCTYPE html>
<html>
<body>

<canvas id="myCanvas" width="500" height="300" style="border:1px solid #2d0ceb;">
</canvas>

<script>
var c = document.getElementById("myCanvas");
var ctx = c.getContext("2d");

// Create gradient from top-left (10,10) to bottom-right (310,210)
var grd = ctx.createLinearGradient(10, 10, 310, 210);
grd.addColorStop(0, "red");
grd.addColorStop(1, "blue");

// Fill rectangle with gradient
ctx.fillStyle = grd;
ctx.fillRect(10, 10, 300, 200);
</script>

</body>
</html>
